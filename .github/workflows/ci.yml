name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram

      - uses: actions/checkout@v4

      - name: Checkout hologram (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Hologram-Technologies/hologram
          token: ${{ steps.app-token.outputs.token }}
          path: ../hologram

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate ONNX fixtures
        run: |
          pip3 install onnx numpy --break-system-packages 2>/dev/null || pip install onnx numpy
          python3 scripts/gen-fixtures.py

      - name: Build workspace
        run: cargo build --workspace

      - name: Run unit tests
        run: cargo test --workspace

      - name: Run integration tests
        run: cargo test --test pipeline

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --check

  conformance:
    name: ORT Conformance
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram

      - uses: actions/checkout@v4

      - name: Checkout hologram (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: Hologram-Technologies/hologram
          token: ${{ steps.app-token.outputs.token }}
          path: ../hologram

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-conformance-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-conformance-

      - name: Install ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.18.1/onnxruntime-linux-x64-1.18.1.tgz
          tar xzf onnxruntime-linux-x64-1.18.1.tgz
          echo "ORT_DYLIB_PATH=$(pwd)/onnxruntime-linux-x64-1.18.1/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      - name: Generate quant fixtures
        run: |
          pip3 install numpy --break-system-packages 2>/dev/null || pip install numpy
          python3 scripts/gen-quant-vectors.py

      - name: Run conformance tests (Tier 2)
        run: cargo test -p hologram-ai-conformance --features=conformance

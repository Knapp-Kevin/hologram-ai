name: Deploy web GUI to GitHub Pages

# Builds the hologram-ai browser GUI (ADR-0017): compile the real runtime core to
# WebAssembly, bundle the React app, publish the static site to Pages.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # hologram-* crates are git deps on a private repo. CI generates an
      # App token scoped to that repo and configures git's `insteadOf` so
      # cargo's `git-fetch-with-cli` picks it up. No sibling clone.
      - name: Generate GitHub App token (hologram read access)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram

      - name: Build site
        uses: ./.github/actions/build-site
        with:
          app-token: ${{ steps.app-token.outputs.token }}
          out-dir: _site

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

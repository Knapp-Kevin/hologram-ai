# TinyLlama 1.1B Chat — int8-quantized compile + generate.
#
# hologram-ai uses explicit CLI flags (there is no `--config` mode). The fields
# below are reference values; the exact commands are:
#
# Download (lays out model.onnx + tokenizer.json + config.json under models/…):
#   cargo run --release -- download TinyLlama/TinyLlama-1.1B-Chat-v1.0
#
# Generate from the model source — arbitrary length, int8 weights (~1 byte/param).
# The window grows on demand up to the model's real context; greedy at temp 0:
#   cargo run --release -- run models/TinyLlama-1.1B-Chat-v1.0 \
#     --quantize int8 \
#     --prompt "The capital of France is" \
#     --prompt-template "<|user|>\n{prompt}</s>\n<|assistant|>\n" \
#     --max-tokens 60 --stop "</s>"
#
# Or precompile a fixed-window .holo (bakes the tokenizer beside the model):
#   cargo run --release -- compile \
#     --model models/TinyLlama-1.1B-Chat-v1.0/model.onnx \
#     --output models/TinyLlama-1.1B-Chat-v1.0 --quantize int8 --seq-len 256
#   cargo run --release -- run models/TinyLlama-1.1B-Chat-v1.0/model.holo \
#     --prompt "The capital of France is" \
#     --prompt-template "<|user|>\n{prompt}</s>\n<|assistant|>\n" \
#     --max-tokens 60 --stop "</s>"
#
# STATUS: TinyLlama 1.1B is Llama-family — same architecture path SmolLM2-135M
# is verified on end-to-end (RoPE + causal grouped-query attention + RMSNorm +
# SwiGLU + LM head, ORT logit parity green; see `examples/smollm2.toml`). The
# generation loop is the same `run <dir> --prompt` path. TinyLlama is the
# next-up validation target — what blocks it on this dev box is RAM, not
# correctness:
#
# Hardware floor (measured on a 15 GB box with rust-analyzer killed):
#   - Compile path peaks ≈ 9.5 GB resident for the f32 4.4 GB weight set
#     before the q4 quantization pass completes (the DataPropagation pass
#     touches the dense weights to compute quant scales).
#   - Practical floor: ≥ 12 GB free RAM at compile time, plus ≥ 8 GB for
#     runtime weights + KV-elision pool at q4 quantization.
#
# On a box with the headroom, the commands below are the verified Llama-family
# path SmolLM2 lives on. The greedy generation loop itself is verified
# end-to-end against ONNX Runtime by `cargo run -p hologram-ai --example
# text_generation` (deterministic, closed-form check) and
# `tests/generation_synthetic.rs`.
#
# hologram-ai replaces the mutable KV-cache with content-addressed κ-label
# elision: it runs HuggingFace's with-past decoder exports as a full-recompute
# prefill with an empty past (`Concat(past[…,0,…], cur) = cur`) and `run
# --prompt` recomputes the growing token window, eliding the unchanged prefix
# by content address. Verified end-to-end on SmolLM2-135M.

[model]
hf_id = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
quantize = "int8"

[run]
prompt = "The capital of France is"
prompt_template = "<|user|>\n{prompt}</s>\n<|assistant|>\n"
max_tokens = 60
temperature = 0.0
stop = ["</s>"]
